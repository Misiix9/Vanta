name: Release Vanta v2.0.0

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vanta v2.0.0 -- Raycast-Style Extension Engine

            ### Breaking Changes

            This is a **major architectural release**. The entire JSON script system has been replaced with a Raycast-style extension engine.

            - **Removed**: JSON script system (`scripts.rs`, `doctor.rs`, `store.rs`, `bundles.rs`), `install:` prefix, script store, `vanta doctor` CLI command, `ScriptResultItem` component.
            - **Removed config**: `scripts.directory`, `scripts.timeout_ms`, `scripts.strict_json` replaced by `extensions.directory`, `extensions.dev_mode`.

            ### New Features

            - **Extension Engine**: Extensions live in `~/.config/vanta/extensions/<name>/` with a `manifest.json` and compiled `dist/index.js` IIFE bundle.
            - **Multi-command extensions**: Each extension can declare multiple commands with `view` (custom UI) or `no-view` (action + toast) modes.
            - **TypeScript/Svelte SDK**: Extensions receive a `VantaAPI` object for navigation, clipboard, toast, and shell access. SDK components (`List`, `Form`, `Grid`, `Detail`, `ActionPanel`) are provided via `window.__vanta_sdk`.
            - **Custom screen rendering**: View-mode commands mount full Svelte components inside `ExtensionHost` with navigation stack support.
            - **Hot-reload**: File watcher on the extensions directory detects changes and re-scans automatically.
            - **Extension search**: Extension commands appear in search results with fuzzy matching.
            - **Workflow macros**: Updated to support `extension` step type alongside `system`.

            ### Technical Highlights

            - New `extensions.rs` Rust module: manifest parsing, validation (path traversal protection), bundle loading, file watching.
            - `ExtensionHost.svelte`: manages view navigation stack, mount/unmount lifecycle, error boundaries, style injection.
            - SDK loader (`loader.ts`): dynamic script injection with registration timeout and cleanup.
            - 5 pre-built Svelte 5 SDK components themed with Vanta CSS variables.
            - CSP updated to allow `blob:` in `script-src` for dynamic module loading.
            - `jsonschema` dependency removed from Cargo.toml.

            ### Known Issues
            - AppImage bundling is temporarily disabled due to linuxdeploy strip failures on RELR ELF sections.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
