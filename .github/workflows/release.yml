name: Release Vanta v5.14.0

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Check Visual Performance Budgets
        run: npm run check:visual-budgets

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Package Artifacts
        run: ./scripts/verify-release-packages.sh

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vanta v5.14.0 -- Phase 45 Workspace Canvas And Multi-Pane Views

            Introduces optional workspace canvas layouts for advanced workflows while preserving single-pane launcher speed as default.

            ### Highlights
            - Added optional multi-pane composition for results + details + quick actions.
            - Persisted per-profile workspace layout preference via `search.layout_mode`.
            - Added status bar and keyboard (`Ctrl+\`) toggles between single and multi pane modes.
            - Kept single-pane fast mode as first-class default for instant launch/search flow.

            ### Packaging
            - Deb and RPM bundles with package verification checks.

            ### Known Issues
            - AppImage bundling remains disabled due to linuxdeploy strip failures on RELR ELF sections.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
