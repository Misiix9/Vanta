name: Release Vanta

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), optional override"
        required: false
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Resolve versions
        id: versions
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d '"' -f2)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          DISPATCH_VERSION="${{ github.event.inputs.version || '' }}"

          if [ -n "${DISPATCH_VERSION}" ]; then
            RELEASE_VERSION="${DISPATCH_VERSION}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_VERSION="${TAG_VERSION}"
          else
            RELEASE_VERSION="${PACKAGE_VERSION}"
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tauri_version=${TAURI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cargo_version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "dispatch_version=${DISPATCH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version alignment
        run: |
          if [ "${{ steps.versions.outputs.package_version }}" != "${{ steps.versions.outputs.tauri_version }}" ]; then
            echo "package.json and tauri.conf.json versions differ"
            exit 1
          fi

          if [ "${{ steps.versions.outputs.package_version }}" != "${{ steps.versions.outputs.cargo_version }}" ]; then
            echo "package.json and Cargo.toml versions differ"
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]] && [ "${{ steps.versions.outputs.package_version }}" != "${{ steps.versions.outputs.tag_version }}" ]; then
            echo "Tag version does not match package version"
            exit 1
          fi

          if [ -n "${{ steps.versions.outputs.dispatch_version }}" ] && [ "${{ steps.versions.outputs.package_version }}" != "${{ steps.versions.outputs.dispatch_version }}" ]; then
            echo "workflow_dispatch version does not match package version"
            exit 1
          fi

      - name: Build release notes from changelog
        id: notes
        run: |
          VERSION="${{ steps.versions.outputs.package_version }}"
          SECTION_FILE="${RUNNER_TEMP}/changelog_section.md"
          BODY_FILE="${RUNNER_TEMP}/release_body.md"

          awk -v version="${VERSION}" '
            $0 == "## " version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > "${SECTION_FILE}"

          sed -i '/./,$!d' "${SECTION_FILE}"

          if ! grep -q '^- ' "${SECTION_FILE}"; then
            echo "CHANGELOG.md is missing bullet patch notes for version ${VERSION}"
            exit 1
          fi

          HIGHLIGHTS=$(grep '^- ' "${SECTION_FILE}" | head -n 4)

          {
            echo "## Vanta v${VERSION}"
            echo
            echo "### Highlights"
            echo "${HIGHLIGHTS}"
            echo
            echo "### Patch Notes"
            cat "${SECTION_FILE}"
            echo
            echo "### Included artifacts"
            echo "- Debian package (.deb)"
            echo "- RPM package (.rpm)"
            echo
            echo "### Quality gates"
            echo "- cargo test"
            echo "- npm run check"
            echo "- npm run check:visual-budgets"
            echo "- npm run extensions:validate"
            echo
            echo "### Known issues"
            echo "- AppImage bundling remains disabled due to linuxdeploy RELR compatibility issues."
          } > "${BODY_FILE}"

          echo "notes_path=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run frontend checks
        run: npm run check

      - name: Validate extension manifests
        run: npm run extensions:validate

      - name: Check visual performance budgets
        run: npm run check:visual-budgets

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify package artifacts
        run: ./scripts/verify-release-packages.sh

      # AppImage intentionally excluded due to linuxdeploy RELR strip compatibility issues.
      - name: Upload assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: false
          prerelease: false
          name: Vanta v${{ steps.versions.outputs.package_version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}