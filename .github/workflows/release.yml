name: Release Vanta v2.2.0

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vanta v2.2.0 -- Auto-Refresh, Extension Polish, Process Manager & New Extensions

            ### Auto-Refresh

            - **Settings Done auto-refresh**: Clicking "Done" in settings now flushes any pending config save and immediately reloads the launcher with updated settings. No more restarting Vanta.
            - **Live extension cache sync**: The file watcher now updates the in-memory `AppState.extensions_cache` when extensions are added or removed, so newly installed extensions appear in search results instantly.
            - **Smart reload on apps-changed**: When desktop entries change, the launcher re-runs the current search instead of only refreshing idle suggestions.

            ### Extension Polish

            - All 7 original extensions completely rewritten with correct `--vanta-*` CSS variable usage and proper fallbacks.
            - Unique CSS class prefixes per extension (`.weather-*`, `.calc-*`, `.cp-*`, `.proc-*`, `.net-*`, `.timer-*`, `.si-*`) to prevent style collisions.
            - All PNG icons replaced with inline SVG icons (24x24, stroke-based, 1:1 ratio).
            - Buttons, inputs, and text consistently themed -- no more white-on-white issues.

            ### Process Manager (replaces Task Manager)

            - Real-time process table with USER, PID, %CPU, %MEM, COMMAND columns.
            - Auto-refreshes every 3 seconds with live CPU and RAM totals in summary bar.
            - Search/filter processes by name. Sortable columns.
            - Kill processes: click to SIGTERM, Shift+click to SIGKILL.
            - Color-coded rows: orange >50%, red >80% resource usage.

            ### New Extensions

            - **Spotify**: Connect via access token, view now playing with progress bar, playback controls (play/pause/next/previous/shuffle/repeat), search and play tracks.
            - **Clipboard Tools**: 14 text transforms including case conversion, URL/Base64 encode/decode, JSON prettify/minify, duplicate line removal.
            - **Password Generator**: Configurable length (8-128), character set options, strength meter with entropy estimate, secure generation via `crypto.getRandomValues()`.

            ### 10 Extensions Total

            Weather, Smart Calculator, Color Picker, Process Manager, Network Test, Timer, System Info, Spotify, Clipboard Tools, Password Generator.

            ### Known Issues
            - AppImage bundling is temporarily disabled due to linuxdeploy strip failures on RELR ELF sections.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
