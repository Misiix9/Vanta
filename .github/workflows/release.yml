name: Release Vanta v1.14.1

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Vanta (release AppImage, Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles appimage deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## What's New in ${{ steps.get_version.outputs.VERSION }}

            ### Clipboard Mode Reliability
            - `--clipboard` launch and hotkey now open the clipboard view consistently via startup retries and delayed emits.
            - Clipboard history loads immediately and focuses the search input after the window shows.

            ### Startup & Defaults
            - Window size honors config, clamps to sane bounds, and recenters before showing.
            - `--hidden`/env start hidden respected; window shown only when requested.
            - Config and theme defaults are auto-created if missing to avoid blank launches.

            ### Packaging
            - Release builds run in production mode; AppImage/Deb/RPM artifacts are produced for x86_64 and uploaded as draft assets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
