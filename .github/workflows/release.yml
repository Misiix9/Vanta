name: Release Vanta v2.2.2

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vanta v2.2.2 -- Performance And Input Reliability

            Patch release focused on deterministic keyboard interaction and focus reliability.

            ### Fixes
- Replaced timeout-based selection scrolling with frame-coalesced scrolling for smoother rapid keyboard navigation.
- Added teardown-safe cancellation for pending animation-frame scroll callbacks.
- Replaced timing-based launcher focus transitions with frame-based scheduling in show/fill flows.
- Reduced timing races between result updates and selected-row visibility under stress typing.
- Includes all reliability fixes from v2.2.1 (section rendering, icon theming parity, store/extension UX hardening).

            ### Packaging
            - Deb and RPM bundles are published for this release.

            ### Known Issues
            - AppImage bundling remains disabled due to linuxdeploy strip failures on RELR ELF sections.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
