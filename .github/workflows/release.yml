name: Release Vanta v2.1.0

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            jq \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            libarchive-tools \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Verify version
        run: |
          node -p "require('./package.json').version"
          jq -r '.version' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Vanta (Deb, RPM)
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb rpm
        env:
          NODE_ENV: production
          TAURI_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
          draft: true
          prerelease: false
          name: Vanta ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vanta v2.1.0 -- Vanta Store & Default Extensions

            ### New Features

            - **Vanta Store**: Browse and install extensions from the Vanta Store. Search "store" or "install" in the launcher to open. Extensions are fetched from the [vanta-extensions](https://github.com/Misiix9/vanta-extensions) GitHub repository.
            - **7 Default Extensions**: Weather, Smart Calculator, Color Picker, Task Manager, Network Test, Timer, and System Info -- all available in the store with custom PNG icons.
            - **Extension SDK Capabilities**: Extensions now have access to `network.fetch()`, `shell.execute()`, and `storage.get()/set()` APIs for HTTP requests, system commands, and persistent key-value storage.
            - **PNG Icon Support**: Extensions can bundle `icon.png` files that display in launcher search results via Tauri's asset protocol.
            - **One-click Install/Uninstall**: Install extensions from the store with a single click. Installed extensions immediately appear in launcher search.

            ### Technical Highlights

            - New `store.rs` Rust module: fetches registry from GitHub, downloads extension bundles and icons, handles install/uninstall with path traversal protection.
            - Extended `extensions.rs` with `extension_fetch`, `extension_shell_execute`, `extension_storage_get/set` Tauri commands.
            - `resolve_ext_icon()` helper resolves relative icon paths to absolute filesystem paths for asset protocol rendering.
            - `StoreView.svelte`: full-screen store UI with card layout, install/uninstall buttons, loading states, live install status.
            - Updated CSP `connect-src` and `img-src` for GitHub raw content access.
            - Per-extension persistent storage in `~/.config/vanta/extension-data/<ext_id>.json`.
            - Updated scanner.rs "Vanta Store" entry to use new store flow.

            ### Known Issues
            - AppImage bundling is temporarily disabled due to linuxdeploy strip failures on RELR ELF sections.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
